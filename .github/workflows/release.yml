name: release

# Cut a release by pushing a tag that matches the pom version, e.g. `v0.1.0`.
# See docs/RELEASING.md.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release and upload the jar asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '26'
          cache: maven

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check tag matches pom version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          POM_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [ "$POM_VERSION" != "$VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (=> ${VERSION}) != pom version ${POM_VERSION}"
            exit 1
          fi

      - name: Build jar (skip long ITs)
        run: mvn -B -DskipITs package

      - name: Verify jar --version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          OUT="$(java -jar target/jenny.jar --version)"
          echo "$OUT"
          [ "$OUT" = "jenny ${VERSION}" ] || {
            echo "::error::--version output '$OUT' != expected 'jenny ${VERSION}'"; exit 1; }

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(shasum -a 256 target/jenny.jar | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with jar asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/jenny.jar
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Bumps the Homebrew tap formula. Skipped automatically until the
      # TAP_GITHUB_TOKEN secret (a PAT/fine-grained token with `contents:write`
      # on chas678/homebrew-jennyj) is configured, so the release above never
      # fails for lack of it.
      - name: Update Homebrew tap formula
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/jenny.jar"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/chas678/homebrew-jennyj.git" tap
          FORMULA="tap/Formula/jenny.rb"
          sed -i -E "s|^  url \".*\"|  url \"${URL}\"|" "$FORMULA"
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" "$FORMULA"
          sed -i -E "s|^  version \".*\"|  version \"${VERSION}\"|" "$FORMULA"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "jenny ${VERSION}"
          git push
